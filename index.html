<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Chess</title>
    <style>
      body { margin: 0; background: #1a1a2e; overflow: hidden; }
      #chess-canvas { display: block; width: 100vw; height: 100vh; }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #fff;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        pointer-events: none;
        user-select: none;
        z-index: 10;
      }
      #turn-indicator { font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 8px 14px; border-radius: 8px; }
      #controls {
        margin-top: 8px; background: rgba(0,0,0,0.5); padding: 8px 14px;
        border-radius: 8px; pointer-events: all; display: flex;
        align-items: center; gap: 8px; font-size: 0.9rem;
      }
      #controls select {
        background: #2a2a3e; color: #fff; border: 1px solid #555;
        border-radius: 6px; padding: 4px 8px; font-size: 0.9rem; cursor: pointer;
      }
      #check-warning { color: #ff4444; font-weight: bold; font-size: 1rem; margin-top: 6px; }
      .hidden { display: none !important; }
      #captured-pieces { margin-top: 10px; font-size: 1.4rem; line-height: 1.4; }
      #move-history {
        margin-top: 12px; max-height: 240px; overflow-y: auto;
        background: rgba(0,0,0,0.45); padding: 8px; border-radius: 8px;
        font-size: 0.85rem; line-height: 1.6; pointer-events: all;
      }
      #game-over-screen {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.75); pointer-events: all;
      }
      #game-over-screen h2 { color: #ffd700; font-size: 2.5rem; }
      #restart-btn { margin-top: 16px; padding: 12px 32px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; background: #4a90d9; color: #fff; }

      #mode-selector {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: center; justify-content: center;
        background: rgba(10, 10, 30, 0.92);
        backdrop-filter: blur(6px);
        transition: opacity 0.4s ease;
      }
      #mode-selector.hidden { opacity: 0; pointer-events: none; }
      .mode-card { text-align: center; color: #fff; font-family: 'Segoe UI', sans-serif; }
      .mode-card h1 { font-size: 3rem; margin: 0 0 8px; letter-spacing: 2px; }
      .subtitle { color: #aaa; font-size: 1rem; margin-bottom: 32px; }
      .mode-buttons { display: flex; gap: 20px; justify-content: center; }
      .mode-btn {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15);
        color: #fff; border-radius: 16px; padding: 28px 36px;
        cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.15s;
        width: 180px;
      }
      .mode-btn:hover {
        background: rgba(255,255,255,0.14); border-color: #4a90d9;
        transform: translateY(-3px);
      }
      .mode-icon { font-size: 2.5rem; }
      .mode-label { font-size: 1.1rem; font-weight: 600; }
      .mode-desc { font-size: 0.75rem; color: #aaa; line-height: 1.4; }
      .difficulty-row {
        margin-top: 20px; color: #ccc; font-size: 0.9rem;
        display: flex; align-items: center; gap: 10px; justify-content: center;
      }
      .difficulty-row select {
        padding: 6px 10px; border-radius: 6px;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <canvas id="chess-canvas"></canvas>
    <div id="mode-selector">
      <div class="mode-card">
        <h1>♟ Chess</h1>
        <p class="subtitle">Choose your game mode</p>
        <div class="mode-buttons">
          <button class="mode-btn" data-mode="pvp">
            <span class="mode-icon">👥</span>
            <span class="mode-label">vs Human</span>
            <span class="mode-desc">Pass &amp; play on one screen</span>
          </button>
          <button class="mode-btn" data-mode="ai">
            <span class="mode-icon">🤖</span>
            <span class="mode-label">vs AI</span>
            <span class="mode-desc">Play white against the computer</span>
          </button>
        </div>
        <div class="difficulty-row" id="difficulty-row" style="display:none">
          <label for="difficulty-select">AI difficulty:</label>
          <select id="difficulty-select">
            <option value="easy">Easy (random)</option>
            <option value="medium">Medium (2-ply)</option>
            <option value="hard">Hard (4-ply)</option>
          </select>
        </div>
      </div>
    </div>
    <div id="hud">
      <div id="turn-indicator">White's Turn ♙</div>
      <div id="controls">
        <label for="difficulty">AI Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div id="check-warning" class="hidden">⚠️ CHECK!</div>
      <div id="captured-pieces">
        <div id="captured-white"></div>
        <div id="captured-black"></div>
      </div>
      <div id="move-history"></div>
      <div id="game-over-screen" class="hidden">
        <h2 id="game-over-title"></h2>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
