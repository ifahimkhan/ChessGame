<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Chess</title>
    <style>
      body { margin: 0; background: #1a1a2e; overflow: hidden; }
      #chess-canvas { display: block; width: 100vw; height: 100vh; }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #fff;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        pointer-events: none;
        user-select: none;
        z-index: 10;
      }
      #turn-indicator { font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 8px 14px; border-radius: 8px; }
      #controls {
        margin-top: 8px; background: rgba(0,0,0,0.5); padding: 8px 14px;
        border-radius: 8px; pointer-events: all; display: flex;
        align-items: center; gap: 8px; font-size: 0.9rem;
      }
      #controls select {
        background: #2a2a3e; color: #fff; border: 1px solid #555;
        border-radius: 6px; padding: 4px 8px; font-size: 0.9rem; cursor: pointer;
      }
      #check-warning { color: #ff4444; font-weight: bold; font-size: 1rem; margin-top: 6px; }
      #mute-btn {
        display: block; margin-top: 10px;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; font-size: 1.2rem; padding: 6px 10px; border-radius: 8px;
        cursor: pointer; pointer-events: all;
        transition: background 0.15s;
      }
      #mute-btn:hover { background: rgba(255,255,255,0.2); }
      .hidden { display: none !important; }
      #captured-pieces { margin-top: 10px; font-size: 1.4rem; line-height: 1.4; }
      #move-history {
        margin-top: 12px; max-height: 240px; overflow-y: auto;
        background: rgba(0,0,0,0.45); padding: 8px; border-radius: 8px;
        font-size: 0.85rem; line-height: 1.6; pointer-events: all;
      }
      #game-over-screen {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.75); pointer-events: all;
      }
      #game-over-screen h2 { color: #ffd700; font-size: 2.5rem; }
      #restart-btn { margin-top: 16px; padding: 12px 32px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: none; background: #4a90d9; color: #fff; }

      #mode-selector {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: center; justify-content: center;
        background: rgba(10, 10, 30, 0.92);
        backdrop-filter: blur(6px);
        transition: opacity 0.4s ease;
      }
      #mode-selector.hidden { opacity: 0; pointer-events: none; }
      .mode-card { text-align: center; color: #fff; font-family: 'Segoe UI', sans-serif; }
      .mode-card h1 { font-size: 3rem; margin: 0 0 8px; letter-spacing: 2px; }
      .subtitle { color: #aaa; font-size: 1rem; margin-bottom: 32px; }
      .mode-buttons { display: flex; gap: 20px; justify-content: center; }
      .mode-btn {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15);
        color: #fff; border-radius: 16px; padding: 28px 36px;
        cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.15s;
        width: 180px;
      }
      .mode-btn:hover {
        background: rgba(255,255,255,0.14); border-color: #4a90d9;
        transform: translateY(-3px);
      }
      .mode-icon { font-size: 2.5rem; }
      .mode-label { font-size: 1.1rem; font-weight: 600; }
      .mode-desc { font-size: 0.75rem; color: #aaa; line-height: 1.4; }
      .difficulty-row {
        margin-top: 20px; color: #ccc; font-size: 0.9rem;
        display: flex; align-items: center; gap: 10px; justify-content: center;
      }
      .difficulty-row select {
        padding: 6px 10px; border-radius: 6px;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; font-size: 0.9rem;
      }

      /* ---- 2D board view ---- */
      #board-2d {
        position: fixed; inset: 0; z-index: 5;
        display: flex; align-items: center; justify-content: center;
        background: var(--page-bg, #fff0f6);
        transition: background 0.3s;
      }
      .board2d-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        width: min(92vmin, 720px);
        height: min(92vmin, 720px);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        border: 6px solid rgba(255,255,255,0.7);
      }
      .board2d-cell {
        position: relative; border: none; padding: 0; margin: 0;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 3.2vmin; line-height: 1;
        transition: background 0.12s;
      }
      @media (min-width: 800px) { .board2d-cell { font-size: 38px; } }
      .board2d-piece {
        display: flex; align-items: center; justify-content: center;
        width: 78%; height: 78%; border-radius: 50%;
        filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25));
      }
      .board2d-piece.side-w { background: rgba(255,255,255,0.92); box-shadow: inset 0 0 0 2px rgba(0,0,0,0.12); }
      .board2d-piece.side-b { background: rgba(40,40,55,0.88); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25); }
      .board2d-piece.side-b { text-shadow: 0 0 1px rgba(255,255,255,0.5); }
      .board2d-piece.classic {
        background: none; box-shadow: none; width: auto; height: auto;
        font-size: 1em; /* per-piece size set inline */
        text-shadow:
          1px 0 0 #2c1c0c, -1px 0 0 #2c1c0c, 0 1px 0 #2c1c0c, 0 -1px 0 #2c1c0c,
          0 2px 2px rgba(0,0,0,0.3);
      }
      .board2d-dot {
        position: absolute; width: 26%; height: 26%; border-radius: 50%;
        background: var(--legal, #ff5ca8); opacity: 0.7; pointer-events: none;
      }
      .board2d-capture {
        position: absolute; inset: 8%; border-radius: 50%;
        border: 5px solid var(--legal, #ff5ca8); opacity: 0.8; pointer-events: none;
      }

      /* ---- Settings panel ---- */
      #settings-btn {
        position: fixed; top: 16px; right: 16px; z-index: 200;
        width: 46px; height: 46px; border-radius: 50%;
        background: rgba(255,255,255,0.9); border: none; cursor: pointer;
        font-size: 1.5rem; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        transition: transform 0.2s;
      }
      #settings-btn:hover { transform: rotate(45deg) scale(1.08); }
      #settings-panel {
        position: fixed; top: 70px; right: 16px; z-index: 200;
        background: #fff; color: #333; border-radius: 16px;
        padding: 16px 18px; width: 230px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #settings-panel h3 { margin: 0 0 12px; font-size: 1.1rem; }
      #settings-panel label { display: block; font-size: 0.8rem; font-weight: 600; margin: 12px 0 4px; color: #666; }
      #settings-panel select {
        width: 100%; padding: 8px 10px; border-radius: 10px;
        border: 2px solid #eee; font-size: 1rem; cursor: pointer; background: #fafafa;
      }
      .seg { display: flex; gap: 6px; }
      .seg button {
        flex: 1; padding: 8px; border-radius: 10px; border: 2px solid #eee;
        background: #fafafa; cursor: pointer; font-size: 0.95rem; font-weight: 600;
      }
      .seg button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
    </style>
  </head>
  <body>
    <canvas id="chess-canvas"></canvas>
    <div id="board-2d" class="hidden"></div>

    <button id="settings-btn" class="hidden" title="Settings" aria-label="Settings">⚙️</button>
    <div id="settings-panel" class="hidden">
      <h3>🎨 Look &amp; Feel</h3>
      <label>Board view</label>
      <div class="seg" id="view-seg">
        <button data-view="2d">🟦 2D</button>
        <button data-view="3d">🧊 3D</button>
      </div>
      <label for="theme-select">Color theme</label>
      <select id="theme-select"></select>
      <label for="piece-select">Chess pieces</label>
      <select id="piece-select"></select>
    </div>

    <div id="mode-selector">
      <div class="mode-card">
        <h1>♟ Chess</h1>
        <p class="subtitle">Choose your game mode</p>
        <div class="mode-buttons">
          <button class="mode-btn" data-mode="pvp">
            <span class="mode-icon">👥</span>
            <span class="mode-label">vs Human</span>
            <span class="mode-desc">Pass &amp; play on one screen</span>
          </button>
          <button class="mode-btn" data-mode="ai">
            <span class="mode-icon">🤖</span>
            <span class="mode-label">vs AI</span>
            <span class="mode-desc">Play white against the computer</span>
          </button>
        </div>
        <div class="difficulty-row" id="difficulty-row" style="display:none">
          <label for="difficulty-select">AI difficulty:</label>
          <select id="difficulty-select">
            <option value="easy">Easy (random)</option>
            <option value="medium">Medium (2-ply)</option>
            <option value="hard">Hard (4-ply)</option>
          </select>
        </div>
      </div>
    </div>
    <div id="hud">
      <div id="turn-indicator">White's Turn ♙</div>
      <div id="controls">
        <label for="difficulty">AI Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div id="check-warning" class="hidden">⚠️ CHECK!</div>
      <div id="captured-pieces">
        <div id="captured-white"></div>
        <div id="captured-black"></div>
      </div>
      <div id="move-history"></div>
      <div id="game-over-screen" class="hidden">
        <h2 id="game-over-title"></h2>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
